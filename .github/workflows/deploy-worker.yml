name: Deploy Worker + Frontend

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-worker.yml'
      - 'mail-worker/**'
      - 'mail-vue/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Clear any cached build output to force fresh build
      - name: Clear old dist directories
        run: |
          rm -rf mail-vue/dist mail-worker/dist
          echo "Cleared old dist directories"

      # Build Vue frontend → outputs to mail-worker/dist/
      - name: Install Vue dependencies
        working-directory: ./mail-vue
        run: npm install

      - name: Build Vue
        working-directory: ./mail-vue
        run: npm run build
        env:
          NODE_ENV: release

      # Build Worker bundle
      - name: Install Worker dependencies
        working-directory: ./mail-worker
        run: npm install

      - name: Bundle worker
        working-directory: ./mail-worker
        run: npx esbuild src/index.js --bundle --outdir=dist --format=esm --external:node:events --external:node:async_hooks

      # ⚠️ CRITICAL: Copy Vue build output to mail-worker/dist/ for Cloudflare Assets
      - name: Copy Vue build to Worker assets directory
        run: |
          mkdir -p mail-worker/dist
          ls mail-vue/dist/ || (echo "ERROR: mail-vue/dist not found, Vue build may have been cached"; exit 1)
          cp -r mail-vue/dist/* mail-worker/dist/
          ls mail-worker/dist/ || (echo "ERROR: mail-worker/dist is empty"; exit 1)
          echo "Copied Vue build to mail-worker/dist/"

      - name: Deploy to Cloudflare
        working-directory: ./mail-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy -c wrangler.deploy.toml
