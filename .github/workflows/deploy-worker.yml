name: Deploy Worker

on:
  push:
    branches:
      - main
    paths:
      - 'mail-worker/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: ./mail-worker
        run: npm install

      - name: Bundle worker
        working-directory: ./mail-worker
        run: npx esbuild src/index.js --bundle --outdir=dist --format=esm --external:node:events --external:node:async_hooks

      - name: Deploy to Cloudflare
        working-directory: ./mail-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy -c wrangler.deploy.toml --no-bundle
